<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Mandiri Generus</title>
    <!-- Memuat Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-emerald-600">Pendataan Generus</h2>
        
        <form id="formGenerus" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                <input type="text" id="nama" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Jenis Kelamin</label>
                <select id="jenis_kelamin" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option value="">-- Pilih Jenis Kelamin --</option>
                    <option value="L">L (Laki-laki)</option>
                    <option value="P">P (Perempuan)</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tempat Lahir</label>
                    <input type="text" id="tempat_lahir" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tanggal Lahir</label>
                    <input type="date" id="tanggal_lahir" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Desa</label>
                    <select id="desa" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="">-- Pilih Desa --</option>
                        <option value="Desa Karanglo Selatan">Desa Karanglo Selatan</option>
                        <option value="Desa Karanglo Utara">Desa Karanglo Utara</option>
                        <option value="Desa Bandardawung">Desa Bandardawung</option>
                        <option value="Desa Krangean">Desa Krangean</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Kelompok</label>
                    <select id="kelompok" required disabled class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-gray-100">
                        <option value="">-- Pilih Desa Dahulu --</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 text-white p-3 rounded-md font-semibold hover:bg-emerald-700 transition">Kirim Data Mandiri</button>
        </form>
    </div>

    <script>
        // Inisialisasi Supabase
        const SUPABASE_URL = "https://xijlyydfogbkcctlycsb.supabase.co";
        const SUPABASE_ANON_KEY = "GANTI_DENGAN_KEY_BARU_ANDA";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const dataWilayah = {
            "Desa Karanglo Selatan": ["Blimbing 1", "Blimbing 2", "Blimbing 3", "Pedan Selatan", "Pedan Utara", "Jabalkanil", "Karanglo"],
            "Desa Karanglo Utara": ["Pandeyan", "Dukuh", "Sadakan Lor", "Sadakan Kidul 1", "Sadakan Kidul 2", "Sekuwung", "Cepogo", "Plombokan"],
            "Desa Bandardawung": ["Dawung Atas", "Dawung Tengah", "Dawung Bawah", "Bandardawung Timur", "Bandardawung Barat", "Gondan Timur", "Gongdang Tengah", "Gondang Barat", "Pelas Timur", "Pelas Barat", "Gamping", "Ngasem"],
            "Desa Krangean": ["Gondosuli", "Tawang 1", "Tawang 2", "Watusambang", "Somokado", "Gondang Boma", "Krangean Selatan", "Krangean Utara", "Nglegok Atas", "Nglegok Bawah", "Ngreso"]
        };

        const desaSelect = document.getElementById('desa');
        const kelompokSelect = document.getElementById('kelompok');

        // Logika Dropdown Berjenjang
        desaSelect.addEventListener('change', function() {
            const desaTerpilih = this.value;
            kelompokSelect.innerHTML = '<option value="">-- Pilih Kelompok --</option>';
            
            if(desaTerpilih && dataWilayah[desaTerpilih]) {
                kelompokSelect.disabled = false;
                kelompokSelect.classList.remove('bg-gray-100');
                dataWilayah[desaTerpilih].forEach(kel => {
                    const opt = document.createElement('option');
                    opt.value = kel;
                    opt.textContent = kel;
                    kelompokSelect.appendChild(opt);
                });
            } else {
                kelompokSelect.disabled = true;
                kelompokSelect.classList.add('bg-gray-100');
            }
        });

        // Proses Submit
        document.getElementById('formGenerus').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "Mengirim...";

            const formData = {
                nama: document.getElementById('nama').value,
                jenis_kelamin: document.getElementById('jenis_kelamin').value,
                tempat_lahir: document.getElementById('tempat_lahir').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value,
                desa: document.getElementById('desa').value,
                kelompok: document.getElementById('kelompok').value
            };

            const { data, error } = await supabase.from('data_generus').insert([formData]);

            if (error) {
                console.error("Error:", error);
                alert('Gagal mengirim data: ' + error.message);
                btn.disabled = false;
                btn.textContent = "Kirim Data Mandiri";
            } else {
                alert('Data berhasil disimpan!');
                document.getElementById('formGenerus').reset();
                kelompokSelect.disabled = true;
                kelompokSelect.classList.add('bg-gray-100');
                btn.disabled = false;
                btn.textContent = "Kirim Data Mandiri";
            }
        });
    </script>
</body>
</html>
