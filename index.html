<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    
    <title>Formulir Mandiri Generus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f4f7f5 0%, #e8efe9 100%);
        }

        .capitalize-input {
            text-transform: capitalize;
        }

        .glass-input {
            transition: all 0.3s ease;
            background-color: #ffffff;
        }
        .glass-input:focus {
            background-color: #ffffff;
            border-color: #059669;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.12);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 antialiased relative">

    <div class="bg-white/90 backdrop-blur-md p-6 sm:p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 w-full max-w-xl my-4">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="logo insan qurany.jpg" alt="Logo" class="h-20 w-auto object-contain drop-shadow-sm" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='inline-flex';">
                
                <div id="fallback-icon" class="hidden items-center justify-center w-14 h-14 rounded-full bg-emerald-50 text-emerald-600">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl sm:text-3xl font-bold tracking-tight text-green-700">PENDATAAN GENERUS</h2>
            <p class="text-xs sm:text-sm text-gray-500 mt-1.5 font-medium">Silakan lengkapi data generus anda dengan benar</p>
            <div class="w-12 h-1 bg-gradient-to-r from-emerald-500 to-teal-600 mx-auto mt-4 rounded-full"></div>
        </div>
        
        <form id="formGenerus" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama sesuai KTP/KK" class="glass-input capitalize-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 placeholder-gray-400">
            </div>
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Jenis Kelamin</label>
                <select id="jenis_kelamin" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                    <option value="" class="text-gray-400">-- Pilih Jenis Kelamin --</option>
                    <option value="L">Laki-laki</option>
                    <option value="P">Perempuan</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Tempat Lahir</label>
                <input type="text" id="tempat_lahir" required placeholder="Kota/Kabupaten" class="glass-input capitalize-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 placeholder-gray-400">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Tanggal Lahir</label>
                <div class="grid grid-cols-3 gap-2">
                    <select id="dob_tanggal" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                        <option value="">Tgl</option>
                    </select>
                    
                    <select id="dob_bulan" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                        <option value="">Bulan</option>
                        <option value="01">Januari</option>
                        <option value="02">Februari</option>
                        <option value="03">Maret</option>
                        <option value="04">April</option>
                        <option value="05">Mei</option>
                        <option value="06">Juni</option>
                        <option value="07">Juli</option>
                        <option value="08">Agustus</option>
                        <option value="09">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                    </select>

                    <select id="dob_tahun" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                        <option value="">Tahun</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Desa</label>
                    <select id="desa" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                        <option value="">-- Pilih Desa --</option>
                        <option value="Desa Karanglo Selatan">Karanglo Selatan</option>
                        <option value="Desa Karanglo Utara">Karanglo Utara</option>
                        <option value="Desa Bandardawung">Bandardawung</option>
                        <option value="Desa Krangean">Krangean</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Kelompok</label>
                    <select id="kelompok" required disabled class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-gray-50/50 text-gray-400">
                        <option value="">-- Pilih Desa Terlebih Dahulu --</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Kategori Usia</label>
                <select id="kategori_usia" required class="glass-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 bg-white">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="PAUD">PAUD</option>
                    <option value="TK">TK</option>
                    <option value="Caberawit">Caberawit</option>
                    <option value="Pra Remaja">Pra Remaja</option>
                    <option value="Remaja">Remaja</option>
                    <option value="Usia Mandiri">Usia Mandiri</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Kelas Formal / Status</label>
                <input type="text" id="kelas_formal" required placeholder="Contoh: 3 SD, 1 SMA, Kuliah Sem 4, Kerja" class="glass-input capitalize-input block w-full rounded-xl border-gray-200 shadow-sm p-3 border text-sm text-gray-800 placeholder-gray-400">
            </div>
            
            <div class="pt-2">
                <button type="submit" id="submitBtn" class="w-full relative inline-flex items-center justify-center p-3.5 text-sm font-semibold tracking-wide text-white bg-gradient-to-r from-emerald-600 to-teal-600 rounded-xl hover:from-emerald-700 hover:to-teal-700 shadow-[0_4px_12px_rgba(5,150,105,0.2)] hover:shadow-[0_6px_20px_rgba(5,150,105,0.3)] transition-all duration-300 transform active:scale-[0.98]">
                    Kirim Data Generus
                </button>
            </div>
        </form>
    </div>

    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300">
            
            <div id="modalSuccess" class="hidden">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 text-green-600 mb-4">
                    <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-1">Terima Kasih</h3>
                <p class="text-sm text-gray-500">Data berhasil disimpan</p>
            </div>

            <div id="modalError" class="hidden">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 text-red-600 mb-4">
                    <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-1">Gagal Terkirim</h3>
                <p id="errorMessage" class="text-xs text-gray-400 mt-2 bg-gray-50 p-2 rounded border border-dashed break-words text-left max-h-24 overflow-y-auto">Detail Error.</p>
            </div>

            <button type="button" onclick="closeModal()" class="mt-6 w-full py-2.5 px-4 bg-gray-100 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-200 active:scale-[0.98] transition">
                Tutup
            </button>
        </div>
    </div>

    <script>
        // Generate Dropdown Tanggal Otomatis
        const dobTanggal = document.getElementById('dob_tanggal');
        const dobTahun = document.getElementById('dob_tahun');

        for (let i = 1; i <= 31; i++) {
            const val = i < 10 ? '0' + i : i;
            dobTanggal.options[dobTanggal.options.length] = new Option(val, val);
        }

        const tahunSekarang = new Date().getFullYear();
        for (let i = tahunSekarang; i >= tahunSekarang - 50; i--) {
            dobTahun.options[dobTahun.options.length] = new Option(i, i);
        }

        // Data Wilayah (Sudah Diperbaiki)
        const dataWilayah = {
            "Desa Karanglo Selatan": ["Blimbing 1", "Blimbing 2", "Blimbing 3", "Pedan Selatan", "Pedan Utara", "Jabalkanil", "Karanglo"],
            "Desa Karanglo Utara": ["Pandeyan", "Dukuh", "Sadakan Lor", "Sadakan Kidul 1", "Sadakan Kidul 2", "Sekuwung", "Cepogo", "Plombokan"],
            "Desa Bandardawung": ["Dawung Atas", "Dawung Tengah", "Dawung Bawah", "Bandardawung Timur", "Bandardawung Barat", "Gondang Timur", "Gondang Tengah", "Gondang Barat", "Pelas Timur", "Pelas Barat", "Gamping", "Ngasem"],
            "Desa Krangean": ["Gondosuli", "Tawang 1", "Tawang 2", "Watusambang", "Somokado", "Gondang Boma", "Krangean Selatan", "Krangean Utara", "Nglegok Atas", "Nglegok Bawah", "Ngreso"]
        };

        const desaSelect = document.getElementById('desa');
        const kelompokSelect = document.getElementById('kelompok');
        const submitBtn = document.getElementById('submitBtn');
        
        const customModal = document.getElementById('customModal');
        const modalSuccess = document.getElementById('modalSuccess');
        const modalError = document.getElementById('modalError');
        const errorMessage = document.getElementById('errorMessage');

        desaSelect.addEventListener('change', function() {
            const desaTerpilih = this.value;
            kelompokSelect.innerHTML = '<option value="">-- Pilih Kelompok --</option>';
            
            if(desaTerpilih && dataWilayah[desaTerpilih]) {
                kelompokSelect.disabled = false;
                kelompokSelect.classList.remove('bg-gray-50/50', 'text-gray-400');
                kelompokSelect.classList.add('bg-white', 'text-gray-800');
                
                dataWilayah[desaTerpilih].forEach(kelompok => {
                    const opt = document.createElement('option');
                    opt.value = kelompok;
                    opt.textContent = kelompok;
                    kelompokSelect.appendChild(opt);
                });
            } else {
                kelompokSelect.disabled = true;
                kelompokSelect.classList.add('bg-gray-50/50', 'text-gray-400');
                kelompokSelect.classList.remove('bg-white', 'text-gray-800');
                kelompokSelect.innerHTML = '<option value="">-- Pilih Desa Terlebih Dahulu --</option>';
            }
        });

        // Logika Pengontrol Tampilan Modal Custom
        function showModal(isSuccess, messageText = "") {
            customModal.classList.remove('hidden');
            setTimeout(() => {
                customModal.classList.remove('opacity-0');
                customModal.querySelector('div').classList.remove('scale-95');
            }, 10);

            if (isSuccess) {
                modalSuccess.classList.remove('hidden');
                modalError.classList.add('hidden');
            } else {
                modalError.classList.remove('hidden');
                modalSuccess.classList.add('hidden');
                errorMessage.textContent = messageText;
            }
        }

        function closeModal() {
            customModal.classList.add('opacity-0');
            customModal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                customModal.classList.add('hidden');
            }, 300);
        }

        function toTitleCase(str) {
            return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

        // KREDENSIAL SUPABASE
        const SUPABASE_URL = "https://xijlyydfogbkcctlycsb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpamx5eWRmb2dia2NjdGx5Y3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzAxODYsImV4cCI6MjA5NzcwNjE4Nn0.JwqYXWEt2yiLioI1o9qZ3KRrak2rtzO1Tp0eN7AuAm4";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Menangkap Aksi Kirim Form Secara Aman
        document.getElementById('formGenerus').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = "Sedang Mengirim Data...";
            
            const nama = toTitleCase(document.getElementById('nama').value.trim());
            const jenis_kelamin = document.getElementById('jenis_kelamin').value;
            const tempat_lahir = toTitleCase(document.getElementById('tempat_lahir').value.trim());
            
            const tgl = document.getElementById('dob_tanggal').value;
            const bln = document.getElementById('dob_bulan').value;
            const thn = document.getElementById('dob_tahun').value;
            const tanggal_lahir = `${thn}-${bln}-${tgl}`;

            const desa = document.getElementById('desa').value;
            const kelompok = document.getElementById('kelompok').value;
            const kategori_usia = document.getElementById('kategori_usia').value;
            const kelas_formal = toTitleCase(document.getElementById('kelas_formal').value.trim());

            try {
                const { data, error } = await supabaseClient
                    .from('data_generus')
                    .insert([
                        { 
                            nama: nama, 
                            jenis_kelamin: jenis_kelamin, 
                            tempat_lahir: tempat_lahir, 
                            tanggal_lahir: tanggal_lahir,
                            desa: desa,
                            kelompok: kelompok,
                            kategori_usia: kategori_usia,
                            kelas_formal: kelas_formal
                        }
                    ])
                    .select();

                if (error) throw error;

                // Memanggil Modal Sukses Custom
                showModal(true);
                document.getElementById('formGenerus').reset();
                
                kelompokSelect.disabled = true;
                kelompokSelect.classList.add('bg-gray-50/50', 'text-gray-400');
                kelompokSelect.classList.remove('bg-white', 'text-gray-800');
                kelompokSelect.innerHTML = '<option value="">-- Pilih Desa Terlebih Dahulu --</option>';

            } catch (err) {
                console.error('Detail Masalah:', err);
                // Memanggil Modal Gagal Custom
                showModal(false, err.message || 'Koneksi bermasalah atau RLS policy belum disetting.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Kirim Data Generus";
            }
        });
    </script>
</body>
</html>
